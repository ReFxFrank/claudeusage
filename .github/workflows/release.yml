name: Release

# Push a version tag to build single-file executables and publish a GitHub
# Release with them attached:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  # Manual trigger (Actions tab → Release → Run workflow) — creates the tag too.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: pulse.exe
          - os: ubuntu-latest
            artifact: pulse-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Build single-file executable (SEA)
        run: node build/make-exe.mjs

      - name: Smoke test
        shell: bash
        run: ./dist-exe/${{ matrix.artifact }} --help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-exe/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            dist/pulse.exe
            dist/pulse-linux
          generate_release_notes: true
          body: |
            **Pulse** — a local Claude Code usage dashboard.

            ### Download
            - **Windows:** `pulse.exe` — double-click it; Pulse runs in the background (no console
              window) and the dashboard opens at http://localhost:4747. Logs, updates and Stop live
              in the dashboard's **Server panel**. SmartScreen may warn because the binary is
              unsigned: click **More info → Run anyway**.
            - **Linux:** `pulse-linux` — `chmod +x pulse-linux && ./pulse-linux`

            From v1.1.0 Pulse can update itself: when a new release is out, the header shows an
            update pill and the Server panel installs it in one click (sha256-verified).
            Double-clicking a newer `pulse.exe` over a running old one takes over automatically.

            Everything runs locally: Pulse reads `~/.claude` read-only; its only network call is
            the GitHub version check (`--no-update-check` disables it).
            Reasoning-effort chips work out of the box (`/effort` commands are read from your
            transcripts); `pulse.exe --effort-setup` adds optional settings-level logging.
